name: "Release FFCommander Native Binaries"

on:
  push:
    tags:
      - 'v*' # Trigger via `git tag v1.0.0 && git push origin --tags`
  workflow_dispatch: # Allow manual trigger from GitHub UI anytime

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      - name: Rust Package Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri"

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: npm install

      - name: Compile Tauri Core
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "test-build-v__VERSION__"
          releaseName: "FFCommander v__VERSION__"
          releaseBody: "Automated core engine builds for Windows & Linux"
          releaseDraft: true
          prerelease: false
          includeRelease: ${{ github.event_name == 'push' }}
          args: ${{ matrix.args }}

      - name: Upload Bare Binaries
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: FFCommander-${{ matrix.platform }}-Exe
          path: ${{ steps.tauri_build.outputs.artifactPaths }}
